title: "Lucas Piette"
description: "Current Focus and Portfolio"
url: "https://lucaspiette.github.io"
baseurl: ""
repository: "lucaspiette/lucaspiette.github.io"
locale: "en-US"

masthead_title: "Lucas Piette"
search: true

minimal_mistakes_skin: "default"
remote_theme: "mmistakes/minimal-mistakes@4.26.2"

markdown: kramdown
permalink: /:categories/:title/

author:
  name: "Lucas Piette"

atom_feed:
  hide: true

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      classes: wide
